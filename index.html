<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Yu-Cheng</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Raleway:100,100i,200,200i,300,300i,400,400i,500,500i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Lora:400,400i,700,700i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <link href="css/custom_style.css" rel="stylesheet" />
    </head>
    <body>
        <div class='row'>
            <div class="col-md-1"></div>
            <div class="col-md-10">
                <header>
                    <div class="row">
                        <div class="col-md-1"></div>
                       <div class="col-3 col-md-2 d-flex justify-content-center align-items-center">
                            <img src="assets/img/personal-photo.jpg" class="rounded-circle" alt="Personal Photo" id="personal-photo">
                        </div>
                        <div class="col-9 col-md-6">
                            <h1 class="site-heading text-center text-faded d-lg-block">
                                <p class="site-heading-upper">The Resume & Creations </p>
                                <span class="site-heading-lower">of Yu-Cheng, Kuo</span>
                            </h1>
                        </div>
                        <div class="col-md-2"></div>
                        <div class="col-md-1"></div>
                    </div>
                </header>
                <!-- Navigation-->
                <nav class="navbar navbar-expand-lg navbar-light py-lg-2" id="mainNav">
                  <div class="container">
                    <div class="navbar-collapse" id="navbarSupportedContent">
                      <ul class="navbar-nav mx-auto">
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="home.html">Home</a></li>
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="resume.html">Resume</a></li>
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="experience.html">Experience</a></li>
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="research.html">Research</a></li>
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="skills.html">Skills</a></li>
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="portfolio.html">Portfolio</a></li>
                        <li class="nav-item px-lg-4"><a class="nav-link text-uppercase load-page" href="#" data-page="contact.html">Contact</a></li>
                      </ul>
                    </div>
                  </div>
                </nav>
                <section id="dynamic-content" class="page-section clearfix">
                    <!-- load page -->
                </section>
                <footer class="footer text-faded text-center py-2 mb-4">
                    <div class="container"><p class="m-0 small">Copyright &copy; Yu-Cheng, Kuo 2024</p></div>
                </footer>
            </div>
            <div class="col-md-1"></div>
        </div>
        <div id="loader" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </body>
    <!-- Bootstrap core JS-->
    <script src="./libs/bootstrap@5.0.2/bootstrap.bundle.min.js"></script>
    <!-- JQuery core JS-->
    <script src="./libs/jquery@3.7.1/jquery.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
    <script type="text/javascript">
        $(document).ready(function() {
            // Automatically load home.html when the page is loaded
            loadPage('./pages/home.html');

            // Load different pages when navigation buttons are clicked
            $('.load-page').on('click', function(e) {
                e.preventDefault();
                var page = $(this).data('page'); // Change 'pages' to 'page'
                loadPage('./pages/' + page);
            });

            // Function to dynamically load pages using jQuery's ajax method
            function loadPage(page) {
                $('#loader').show(); // Show the loader
                $.ajax({
                    url: page,
                    method: 'GET',
                    success: function(data) {
                        $('#dynamic-content').html(data); // Inject the loaded content
                        $('#loader').hide(); // Hide the loader after content is loaded
                    },
                    error: function() {
                        $('#dynamic-content').html('<p>Sorry, unable to load content.</p>');
                        $('#loader').hide(); // Hide the loader in case of error
                    }
                });
            }
        });
    </script>
</html>
